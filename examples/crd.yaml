# CRD: "Snack이라는 리소스 종류가 있다"를 Kubernetes에 등록
# kubebuilder 없이, 사람이 직접 작성한 CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: snacks.school.example.com
spec:
  group: school.example.com
  names:
    kind: Snack
    plural: snacks
    singular: snack
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                menu:
                  type: string
                quantity:
                  type: integer
